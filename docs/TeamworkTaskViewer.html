<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Task Viewer - Standalone</title>
    <!-- React and Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.2s, color 0.2s; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
        
        .spinner {
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Toggle Switch Styling */
        .toggle-dot { transition: all 0.3s ease-in-out; }
        input:checked ~ .toggle-dot { transform: translateX(100%); background-color: #fff; }
        input:checked ~ .toggle-bg { background-color: #6366f1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, memo } = React;

        const Icon = memo(({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && lucide && lucide[name]) {
                    iconRef.current.innerHTML = ''; 
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', name);
                    iconRef.current.appendChild(iconElement);
                    lucide.createIcons({
                        icons: { [name]: lucide[name] },
                        attrs: { strokeWidth: 2, width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center pointer-events-none" />;
        });

        const App = () => {
            const [data, setData] = useState({ projects: [] });
            const [searchQuery, setSearchQuery] = useState('');
            const [hideEmptyLists, setHideEmptyLists] = useState(false);
            const [expandedProjects, setExpandedProjects] = useState(new Set());
            const [expandedLists, setExpandedLists] = useState(new Set());
            const [selectedTask, setSelectedTask] = useState(null);
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [stats, setStats] = useState({ projects: 0, lists: 0, tasks: 0 });

            useEffect(() => {
                const rootClasses = document.documentElement.classList;
                if (isDarkMode) {
                    rootClasses.add('dark');
                    document.body.className = 'bg-slate-950 text-slate-100 overflow-x-hidden';
                } else {
                    rootClasses.remove('dark');
                    document.body.className = 'bg-slate-50 text-slate-900 overflow-x-hidden';
                }
            }, [isDarkMode]);

            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                setIsProcessing(true);
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const json = JSON.parse(e.target.result);
                        if (json.projects) {
                            setData(json);
                            if (json.projects.length > 0) setExpandedProjects(new Set([json.projects[0].id]));
                            let lCount = 0, tCount = 0;
                            json.projects.forEach(p => {
                                lCount += (p.tasklists || []).length;
                                (p.tasklists || []).forEach(l => { tCount += (l.tasks || []).length; });
                            });
                            setStats({ projects: json.projects.length, lists: lCount, tasks: tCount });
                        }
                    } catch (err) { alert("Invalid JSON: " + err.message); }
                    finally { setIsProcessing(false); }
                };
                reader.readAsText(file);
            };

            const extractImages = (text) => {
                if (!text) return [];
                const regex = /!\[.*?\]\((https?:\/\/.*?)\)/g;
                const matches = []; let match;
                while ((match = regex.exec(text)) !== null) matches.push(match[1]);
                return matches;
            };

            const RichText = ({ text }) => {
                if (!text) return null;
                const cleanText = text.replace(/!\[.*?\]\(.*?\)/g, '[📎 Image Attachment]');
                return <p className="whitespace-pre-wrap leading-relaxed">{cleanText}</p>;
            };

            const filteredData = useMemo(() => {
                if (!data.projects) return [];
                const query = searchQuery.toLowerCase();

                return data.projects.map(project => {
                    const filteredLists = (project.tasklists || []).map(list => {
                        const tasks = (list.tasks || []);
                        const filteredTasks = tasks.filter(task => 
                            task.name?.toLowerCase().includes(query) ||
                            task.description?.toLowerCase().includes(query) ||
                            task.comments?.some(c => c.body?.toLowerCase().includes(query)) ||
                            task.id?.toString().includes(query)
                        );
                        
                        const listMatchesSearch = list.name?.toLowerCase().includes(query);
                        const finalTasks = listMatchesSearch ? tasks : filteredTasks;

                        // Check if we should hide this list based on task count
                        if (hideEmptyLists && finalTasks.length === 0) return null;

                        if (listMatchesSearch || finalTasks.length > 0 || !hideEmptyLists) {
                            return { ...list, tasks: finalTasks };
                        }
                        return null;
                    }).filter(Boolean);
                    
                    const projectMatches = project.name?.toLowerCase().includes(query);
                    if (projectMatches || filteredLists.length > 0) {
                        return { ...project, tasklists: filteredLists };
                    }
                    return null;
                }).filter(Boolean);
            }, [searchQuery, data, hideEmptyLists]);

            const taskImages = useMemo(() => {
                if (!selectedTask) return [];
                const fromDesc = extractImages(selectedTask.description);
                const fromComments = (selectedTask.comments || []).flatMap(c => extractImages(c.body));
                return [...new Set([...fromDesc, ...fromComments])];
            }, [selectedTask]);

            const formatDate = (d) => d ? new Date(d).toLocaleDateString() : 'N/A';

            return (
                <div className="min-h-screen flex flex-col">
                    <header className={`sticky top-0 z-40 border-b ${isDarkMode ? 'bg-slate-900/95 border-slate-800' : 'bg-white/95 border-slate-200'} backdrop-blur-md px-6 py-4`}>
                        <div className="max-w-[1600px] mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-indigo-600 rounded-xl text-white shadow-lg shadow-indigo-500/20">
                                    <Icon name="LayoutGrid" size={24} />
                                </div>
                                <div className="hidden sm:block">
                                    <h1 className="text-lg font-extrabold tracking-tight">Project Navigator</h1>
                                    <p className={`text-[10px] uppercase font-bold tracking-widest ${isDarkMode ? 'text-slate-500' : 'text-slate-400'}`}>High Volume Task Viewer</p>
                                </div>
                            </div>
                            
                            <div className="flex flex-1 items-center justify-center max-w-2xl px-4 gap-4">
                                <div className="relative flex-1 group">
                                    <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                                        <Icon name="Search" size={20} />
                                    </div>
                                    <input 
                                        type="text"
                                        placeholder="Search tasks..."
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        className={`w-full pl-11 pr-4 py-3 rounded-2xl border outline-none transition-all ${isDarkMode ? 'bg-slate-800 border-slate-700 focus:border-indigo-500 text-white' : 'bg-white border-slate-200 focus:border-indigo-500 shadow-sm'}`}
                                    />
                                </div>

                                {/* Filter Toggle */}
                                <div className="flex items-center gap-3 whitespace-nowrap bg-slate-100 dark:bg-slate-800/50 px-4 py-2 rounded-2xl border dark:border-slate-700">
                                    <span className="text-xs font-bold text-slate-500">Hide Empty</span>
                                    <label className="relative inline-flex items-center cursor-pointer">
                                        <input type="checkbox" checked={hideEmptyLists} onChange={() => setHideEmptyLists(!hideEmptyLists)} className="sr-only peer" />
                                        <div className="toggle-bg w-10 h-5 bg-slate-300 dark:bg-slate-700 rounded-full peer transition-colors"></div>
                                        <div className="toggle-dot absolute left-1 top-1 bg-white w-3 h-3 rounded-full shadow transition-all"></div>
                                    </label>
                                </div>
                            </div>

                            <div className="flex items-center gap-3">
                                {isProcessing ? (
                                    <div className="flex items-center gap-2 px-4 py-2 text-indigo-500"><div className="spinner"></div></div>
                                ) : (
                                    <label className={`flex items-center gap-2 px-5 py-2.5 rounded-2xl border cursor-pointer transition-all ${isDarkMode ? 'bg-indigo-900/20 border-indigo-800 text-indigo-400 hover:bg-indigo-900/40' : 'bg-indigo-50 border-indigo-100 text-indigo-700 hover:bg-indigo-100'}`}>
                                        <Icon name="Upload" size={18} />
                                        <span className="text-sm font-bold">Import</span>
                                        <input type="file" accept=".json" onChange={handleFileUpload} className="hidden" />
                                    </label>
                                )}
                                <button onClick={() => setIsDarkMode(!isDarkMode)} className={`p-3 rounded-2xl border ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'} shadow-sm transition-all`}>
                                    {isDarkMode ? <Icon name="Sun" size={20} className="text-amber-400" /> : <Icon name="Moon" size={20} className="text-indigo-600" />}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-[1600px] mx-auto w-full px-6 py-8 flex flex-col lg:flex-row gap-8 flex-1">
                        <div className="flex-1 space-y-4">
                            {data.projects.length === 0 ? (
                                <div className={`text-center py-40 rounded-[40px] border-4 border-dashed ${isDarkMode ? 'border-slate-800 text-slate-600' : 'border-slate-200 text-slate-300'}`}>
                                    <Icon name="FileJson" size={80} className="mx-auto mb-6 opacity-20" />
                                    <h2 className="text-3xl font-black mb-3 text-slate-400">Ready to Load</h2>
                                    <label className="inline-flex items-center gap-3 px-8 py-4 rounded-3xl bg-indigo-600 text-white font-black cursor-pointer hover:bg-indigo-700 shadow-2xl shadow-indigo-500/40 transition-all">
                                        <Icon name="Upload" size={24} /> Upload Report JSON
                                        <input type="file" accept=".json" onChange={handleFileUpload} className="hidden" />
                                    </label>
                                </div>
                            ) : (
                                <div className="space-y-6">
                                    {filteredData.map(project => (
                                        <div key={project.id} className={`rounded-[32px] border overflow-hidden ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200 shadow-sm'}`}>
                                            <div onClick={() => {
                                                const next = new Set(expandedProjects);
                                                if (next.has(project.id)) next.delete(project.id); else next.add(project.id);
                                                setExpandedProjects(next);
                                            }} className={`flex items-center justify-between p-7 cursor-pointer group transition-colors ${isDarkMode ? 'hover:bg-slate-800' : 'hover:bg-slate-50'}`}>
                                                <div className="flex items-center gap-6">
                                                    <div className={`flex items-center justify-center w-12 h-12 rounded-2xl border transition-all ${expandedProjects.has(project.id) ? 'bg-indigo-600 text-white border-indigo-500' : 'bg-transparent text-slate-400 border-slate-200 dark:border-slate-700'}`}>
                                                        <Icon name={expandedProjects.has(project.id) ? "ChevronDown" : "ChevronRight"} size={26} />
                                                    </div>
                                                    <h3 className="text-xl font-black group-hover:text-indigo-500 transition-colors">{project.name}</h3>
                                                </div>
                                            </div>
                                            {expandedProjects.has(project.id) && (
                                                <div className="px-6 pb-6 space-y-4">
                                                    {(project.tasklists || []).map(list => (
                                                        <div key={list.id} className="ml-2">
                                                            <div onClick={() => {
                                                                const next = new Set(expandedLists);
                                                                if (next.has(list.id)) next.delete(list.id); else next.add(list.id);
                                                                setExpandedLists(next);
                                                            }} className={`flex items-center justify-between p-4 rounded-2xl cursor-pointer hover:bg-opacity-80 transition-all ${isDarkMode ? 'hover:bg-slate-800' : 'hover:bg-white shadow-sm'}`}>
                                                                <div className="flex items-center gap-4">
                                                                    <Icon name={expandedLists.has(list.id) ? "ChevronDown" : "ChevronRight"} size={18} className="text-slate-400" />
                                                                    <span className="text-xs font-black uppercase text-slate-500">{list.name}</span>
                                                                </div>
                                                                <span className="text-[11px] font-black px-3 py-1 rounded-full bg-slate-200/50 dark:bg-slate-800 text-slate-500">{list.tasks?.length || 0}</span>
                                                            </div>
                                                            {expandedLists.has(list.id) && (
                                                                <div className="ml-8 mt-3 space-y-2">
                                                                    {(list.tasks || []).map(task => (
                                                                        <div key={task.id} onClick={() => setSelectedTask(task)} className={`group flex items-center justify-between p-5 rounded-2xl border cursor-pointer transition-all ${selectedTask?.id === task.id ? 'bg-indigo-600 border-indigo-500 text-white shadow-xl' : isDarkMode ? 'bg-slate-900 border-slate-800 hover:bg-slate-800' : 'bg-white border-slate-200 hover:border-indigo-300'}`}>
                                                                            <div className="flex items-start gap-4">
                                                                                <Icon name={task.status === 'completed' ? "CheckCircle2" : "Circle"} size={20} className={selectedTask?.id === task.id ? "text-white" : task.status === 'completed' ? "text-green-500" : "text-slate-300"} />
                                                                                <div>
                                                                                    <p className={`text-sm font-extrabold ${task.status === 'completed' && selectedTask?.id !== task.id ? 'line-through opacity-50' : ''}`}>{task.name}</p>
                                                                                    <div className="flex gap-4 mt-2 text-[10px] font-bold opacity-70"><span>#{task.id}</span></div>
                                                                                </div>
                                                                            </div>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        <aside className="lg:w-[500px] w-full shrink-0">
                            <div className={`sticky top-28 rounded-[32px] border overflow-hidden min-h-[500px] flex flex-col transition-all duration-300 ${selectedTask ? (isDarkMode ? 'bg-slate-900 border-slate-800 shadow-2xl' : 'bg-white border-slate-200 shadow-2xl') : 'border-dashed border-slate-300 dark:border-slate-800 opacity-60'}`}>
                                {!selectedTask ? (
                                    <div className="text-center py-40 px-10 text-slate-400 flex flex-col items-center">
                                        <Icon name="Info" size={40} className="mb-4 opacity-40" />
                                        <h3 className="text-lg font-black mb-2">Inspector</h3>
                                        <p className="text-sm">Select a task to view details.</p>
                                    </div>
                                ) : (
                                    <div className="flex flex-col h-full max-h-[calc(100vh-140px)] p-8 overflow-y-auto custom-scrollbar">
                                        <div className="flex justify-between mb-8">
                                            <span className="px-3 py-1 rounded-full text-[10px] font-black border uppercase bg-indigo-50 dark:bg-indigo-900/20 text-indigo-700">{selectedTask.status}</span>
                                            <button onClick={() => setSelectedTask(null)} className="text-slate-400 hover:text-slate-600 text-[10px] font-black uppercase">Close</button>
                                        </div>
                                        <h2 className="text-2xl font-black mb-6 leading-tight">{selectedTask.name}</h2>
                                        <div className={`p-6 rounded-[24px] mb-8 text-[15px] leading-relaxed ${isDarkMode ? 'bg-slate-800 text-slate-300' : 'bg-slate-50 text-slate-600'}`}>
                                            <RichText text={selectedTask.description || "No description."} />
                                        </div>
                                        
                                        {taskImages.length > 0 && (
                                            <div className="mt-4 grid grid-cols-1 gap-4 mb-8">
                                                {taskImages.map((url, idx) => (
                                                    <div key={idx} className="rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-700">
                                                        <img src={url} alt="Attachment" className="w-full h-auto" onError={(e) => { e.target.src = 'https://via.placeholder.com/600x300?text=Image+Unavailable'; }} />
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {selectedTask.comments?.map(c => (
                                            <div key={c.id} className="mb-4 p-5 rounded-3xl border dark:border-slate-800 bg-black/5">
                                                <div className="flex justify-between mb-2">
                                                    <span className="text-xs font-black text-indigo-500">{c.author || 'User'}</span>
                                                    <span className="text-[10px] text-slate-400">{formatDate(c.createdAt)}</span>
                                                </div>
                                                <div className="text-sm leading-relaxed"><RichText text={c.body} /></div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </aside>
                    </main>

                    <footer className={`sticky bottom-0 border-t py-4 px-8 text-[10px] font-black uppercase tracking-[0.3em] flex items-center justify-between ${isDarkMode ? 'bg-slate-900 border-slate-800 text-slate-500' : 'bg-white border-slate-200 text-slate-400'}`}>
                        <span>{stats.tasks.toLocaleString()} Tasks</span>
                        <span>{isProcessing ? 'Processing...' : 'System Ready'}</span>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
